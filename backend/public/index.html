<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGemini</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="md.css">
    <link rel="stylesheet" href="color.css">
    <link rel="manifest" href="/img/manifest.json">
    <script src="highlight.min.js"></script>
    <script src="marked.umd.js"></script>
    <link rel="preload" href="img/5242.png" as="image">

</head>

<body>

    <div class="nav">
        <button class="hisbtn" id="history-b"></button>
        <!-- 模型选择 -->
        <div id="gemini-v" class="send-btn1">
            <p id="gemini-p" class="gemini-p"></p>
            <div id="modelOptions" style="display: none">
                <div model="gemini-2.5-flash-lite">Gemini-2.5快速</div>
                <div model="gemini-2.5-flash">Gemini-2.5思考</div>
                <div model="gemini-3.1-flash-lite-preview">Gemini-3.0快速</div>
                <div model="gemini-3-flash-preview">Gemini-3.0思考</div>
            </div>
        </div>
        <div class="btnbox">
            <button class="dhdhbtn" onclick="opendhdh()"></button>
            <button class="theme-toggle" id="themeToggle"></button>
        </div>
    </div>
    <div class="container">
        <ul id="delhistory"></ul>
        <ul id="sidebar" class="sidebar">
            <button onclick="gmmlogout()">退出登录</button>
            <button onclick="window.open('/fy.html', '_blank')">AI翻译</button>
            <button onclick="delhistorybox.style.display = 'block'">管理历史</button>
            <button onclick="openModelConfig(true)">模型参数设置</button>
            <h3></h3>
            <div id="history-list"></div>
        </ul>
        <ul id="list-dhdh" class="list-1"></ul>
        <main class="chat-area" id="chat-area">
            <div id="welcome">
                <img id="aaa3" src="img/model.png" alt="">
                <h1>Gemini</h1>
                <h2 id="aaa1"></h2>
                <h4 id="aaa2"></h4>
            </div>
            <div id="chat-window"></div>
            <div id="input-area" class="input-area">
                <div id="file-preview-area" class="file-preview-area"></div>
                <textarea id="prompt-input" placeholder="问题总会有答案..." rows="1"></textarea>
                <input type="file" id="file-input" multiple style="display: none;">
                <div class="send-box">
                    <div class="menu">
                        <button id="new-chat-btn">新聊天</button>
                        <button id="addfile"></button>
                        <button id="Search" class="search" style="border: none;">
                            <img src="img/5241.png" id="SearchImg" alt=""
                                style="vertical-align: middle;width: 23px;height: 23px; ">
                        </button>
                        <div id="Connection" title="连接状态"></div>
                        <button id="send-btn" class="send-btn"></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="tongzhi"></div>

    <dialog id="ModelConfig">
        <h2>AI 模型参数设置</h2>
        <div class="setyourapikey">
            <input type="text" id="yourapikey" placeholder="未设置API">
            <button style="width: 60px;margin: 0;" onclick="sendyouapikey()">验证</button>
        </div>
        <div class="param-group">
            <label for="temperatureSlider">Temperature: <span class="value-display"
                    id="temperatureValue">0.7</span></label>
            <input type="range" id="temperatureSlider" min="0" max="1" step="0.01">
        </div>
        <div class="param-group">
            <label for="maxOutputTokensSlider">Max Output Tokens: <span class="value-display"
                    id="maxOutputTokensValue">256</span></label>
            <input type="range" id="maxOutputTokensSlider" min="64" max="8192" step="1">
        </div>
        <div class="param-group">
            <label for="topPSlider">Top P : <span class="value-display" id="topPValue">0.9</span></label>
            <input type="range" id="topPSlider" min="0" max="1" step="0.01">
        </div>
        <div class="param-group">
            <label for="topKSlider">Top K: <span class="value-display" id="topKValue">50</span></label>
            <input type="range" id="topKSlider" min="0" max="100" step="1">
        </div>
        <div class="ModelConfigbutton">
            <button onclick="RestoreDefaultsModelConfig()">默认</button>
            <button onclick="getModelConfig()">确认</button>
            <button onclick="ModelConfig.close()">取消</button>
        </div>
    </dialog>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const opbtn = document.getElementById("history-b");
        const modelOptions = document.getElementById('modelOptions');
        const welcome = document.getElementById('welcome');
        const inputarea = document.getElementById('input-area');
        const Searchbtn = document.getElementById('Search');
        const chatWindow = document.getElementById('chat-window');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const sidebar = document.getElementById('sidebar');
        const historyList = document.getElementById('history-list');
        const chatarea = document.getElementById('chat-area');
        const promptInput = document.getElementById('prompt-input');
        const addFileBtn = document.getElementById('addfile');
        const fileInput = document.getElementById('file-input');
        const filePreviewArea = document.getElementById('file-preview-area');
        const Connection = document.getElementById('Connection');
        const delhistorybox = document.getElementById('delhistory');
        const setapikeybox = document.getElementById('setapikey');
        const yourapikey = document.getElementById('yourapikey');
        const ModelConfig = document.getElementById('ModelConfig');
        // ModelConfig.showModal()
        const socket = io();
        let chatId;
        let accumulatedStreamText = ''; // 用于存储流式响应的原始文本
        let lastmessagebox = null;
        let sendinfobox = null;
        let modelmessage = null;
        let selectedFiles = []; // 用于存储选择的文件
        let SearchOn = false; // 搜索开关
        let API = false;
        let model;
        let allowHashChange = true;



        function writeStringToElement() {
            const text = '获取创意灵感，提升工作效率';
            const element = document.getElementById('aaa1');
            element.style.height = '32px';
            let index = 0;
            const intervalId = setInterval(() => {
                if (index < text.length) {
                    element.textContent += text[index];
                    index++;
                } else {
                    writeStringToElement2()
                    clearInterval(intervalId);
                }
            }, 60);

        }
        function writeStringToElement2() {
            const text = '轻松对话，让 Google AI 帮你写作、规划、学习或处理其他事务';
            const element = document.getElementById('aaa2');
            const element2 = document.getElementById('aaa3');
            element.style.height = '42px'
            let index = 0;
            const intervalId = setInterval(() => {
                if (index < text.length) {
                    element.textContent += text[index];
                    index++;
                } else {
                    setTimeout(() => { element2.style.animation = 'none' }, 2000);
                    ;
                    clearInterval(intervalId);
                }
            }, 30);

        }
        writeStringToElement();

        // --- Socket.IO 事件处理 ---
        socket.on('connect', () => {
            // welcome.style.display = 'block';
            HashChange();
        });

        socket.on('sessionCreated', (data) => {
            chatId = data.chatId;
            allowHashChange = false;
            window.location.hash = chatId;
            setTimeout(() => { allowHashChange = true }, 1000);
        });
        socket.on('historyLoaded', (data) => {
            renderHistory(data.history);
        });
        socket.on('historiesListed', (data) => {
            renderHistoriesList(data.list);
            delHistories(data.list);
        });
        socket.on('userMessageEcho', (data) => {
            appendMessage(data.prompt, 'user', data.fileCount);
            createmodelmessagebox();
            sendBtn.classList.add('loading');
        });
        socket.on('streamChunk', (data) => {
            allowHashChange = false;
            appendStreamChunk(data.chunk);
        });
        socket.on('streamEnd', () => {
            sendBtn.disabled = false;
            sendBtn.classList.remove('loading');
            accumulatedStreamText = '';
            hljs.highlightAll();
            addcopy();
        });
        socket.on('historyerror', (data) => {
            console.error(data.message);
            newChat();
        });
        socket.on('APIerror', (data) => {
            console.error('API错误:', data.message);
            sendBtn.classList.remove('loading');
            sendBtn.disabled = false;
            appenderror(data.message);
        });
        socket.on('refresh', (url) => {
            if (url) { window.location.href = url; } else { location.reload(); }
        });
        socket.on('tongzhi', (data) => {
            xstongzhi(data, 3000);
            if (data === '账户没有配置API_KEY，请配置API_KEY') ModelConfig.showModal();
        });
        socket.on('APIKEY', (data) => {
            if (data) yourapikey.placeholder = data;
        });
        socket.on('error', (data) => {
            alert(`发生错误: ${data.message}`);
        });

        socket.on('disconnect', () => {
            Connection.style.display = 'block';
            sendBtn.disabled = true;
        });

        // --- UI渲染函数 ---
        function renderHistory(history) {
            welcome.style.display = 'none';
            chatWindow.innerHTML = '';
            history.forEach(message => {
                if (message.role === 'user') {
                    const fileCount = message.parts.length > 1 ? message.parts.length - 1 : 0;
                    appendMessage(message.parts[0].text, 'user', fileCount);
                } else if (message.role === 'model') {
                    appendMessage(message.parts[0].text, 'model');
                }
            });
            addcopy();
            hljs.highlightAll();
        }

        function renderHistoriesList(list) {
            historyList.innerHTML = '';
            list = list.sort((a, b) => parseInt(b.chatId) - parseInt(a.chatId));
            list.forEach((item, index) => {
                const a = document.createElement('a');
                const adiv = document.createElement('div');
                adiv.textContent = `${index + 1}.${item.title}`;
                a.appendChild(adiv);
                a.href = '#' + item.chatId;
                a.title = item.title;
                a.dataset.chatId = item.chatId;
                if (item.chatId === chatId) a.classList.add('active');
                a.addEventListener('contextmenu', (event) => {
                    event.preventDefault();
                    removeAllContextMenu();
                    const contextMenu = document.createElement('div');
                    contextMenu.classList.add('contextmenu');
                    contextMenu.innerText = `删除对话${index + 1}`;
                    contextMenu.addEventListener('click', (e) => {
                        const userConfirmed = confirm(`您确定要删除 对话${index + 1} 吗？`);
                        if (!userConfirmed) { return };
                        socket.emit('deleteHistory', { chatId: item.chatId });
                        if (item.chatId === chatId) newChat();
                    });
                    const mouseX = event.clientX;
                    const mouseY = event.clientY;
                    if (window.innerWidth > 500) {
                        contextMenu.style.top = `${mouseY}px`;
                        contextMenu.style.left = `${mouseX}px`;
                    } else {
                        contextMenu.style.top = `${mouseY - 30}px`;
                        contextMenu.style.left = `${mouseX - 45}px`;
                    }

                    document.body.appendChild(contextMenu);
                });
                historyList.appendChild(a);
            });
        }

        function appendMessage(text, sender, fileCount = 0) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message-box');
            const message = document.createElement('div');
            message.classList.add(`${sender}-message`, 'message');

            if (sender === 'user') {
                const messagep = document.createElement('p');
                messagep.innerText = text;
                message.appendChild(messagep);
            } else {
                message.innerHTML = marked.parse(text);
            };

            if (fileCount > 0) {
                const fileCountElement = document.createElement('i');
                fileCountElement.classList.add('fileCount');
                fileCountElement.textContent = `+${fileCount} 个文件`;
                message.appendChild(fileCountElement);
            }

            messageElement.appendChild(message);
            chatWindow.appendChild(messageElement);
        }

        function createmodelmessagebox() {
            const messagebox = document.createElement('div');
            messagebox.classList.add('message-box');

            const message = document.createElement('div');
            message.classList.add('message', 'model-message');
            const status = SearchOn ? 'Searching...' : 'Thinking...';
            message.innerHTML = `<img src="img/gemini.png" alt="" class="mimg"><span class="mspan">${status}</span>`;

            messagebox.appendChild(message);
            chatWindow.appendChild(messagebox);

            promptInput.value = '';
            selectedFiles = [];
            renderFilePreviews();
            // promptInput.focus();

            promptInput.style.height = '0';
            promptInput.style.height = promptInput.scrollHeight + 'px';

            chatWindow.scrollTop = chatWindow.scrollHeight;

            modelmessage = message;
            lastmessagebox = messagebox;
        }

        let isonchatWindowstart = false;
        function appendStreamChunk(chunk) {
            accumulatedStreamText += chunk;
            modelmessage.innerHTML = marked.parse(accumulatedStreamText);

            if (lastmessagebox.offsetHeight >= chatWindow.offsetHeight && !isonchatWindowstart) {
                lastmessagebox.scrollIntoView({ behavior: 'smooth', block: 'start' });
                isonchatWindowstart = true;
            } else if (lastmessagebox.offsetHeight < chatWindow.offsetHeight) {
                chatWindow.scrollTop = chatWindow.scrollHeight;
                isonchatWindowstart = false;
            }

        }

        function appenderror(message) {
            modelmessage.innerText = '';
            const p = document.createElement('p');
            p.innerText = '遇到错误';
            const div = document.createElement('div');
            div.style.color = '#d26161';
            div.innerText = message;
            modelmessage.appendChild(p);
            modelmessage.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
        // --- 发送消息 ---
        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const prompt = promptInput.value.trim();
            if (prompt === '') { xstongzhi('请输入内容'); return }
            if (sendBtn.disabled) return;
            welcome.style.display = 'none';
            sendBtn.disabled = true;
            promptInput.blur();

            const filePromises = selectedFiles.map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        resolve({
                            data: e.target.result.split(',')[1],
                            mimeType: file.type
                        });
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            });

            const files = await Promise.all(filePromises);
            socket.emit('newMessage', {
                chatId,
                prompt,
                files,
                model,
                useWebSearch: SearchOn,
                defaultModelConfig
            });

        }

        // --- 新建对话 ---
        newChatBtn.addEventListener('click', () => newChat());
        function newChat() {
            window.location.hash = "";
            chatId = null;
            chatWindow.innerHTML = '';
            welcome.style.display = 'block';
            document.querySelectorAll('#history-list a').forEach(el => el.classList.remove('active'));
        }
        // 监听hash变化
        // window.addEventListener('load', HashChange);
        window.addEventListener('hashchange', HashChange);
        function HashChange() {
            if (!allowHashChange) return;
            const hash = window.location.hash;
            chatId = hash.slice(1);
            if (chatId.length === 15) {
                socket.emit('loadHistory', { chatId });
                closehislist();
                chatWindow.innerHTML = '<svg class="loader" viewBox="25 25 50 50"> <circle r="20" cy="50" cx="50"></circle></svg>';
                document.querySelectorAll('#history-list a').forEach(el => {
                    el.classList.toggle('active', el.dataset.chatId === chatId)
                });
            } else {
                newChat();
            };
        };

    </script>
    <script src="script.js"></script>
    <script src="script2.js"></script>
    <script src="theme.js"></script>
</body>

</html>
